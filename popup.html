<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PO OTC Signal</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      margin: 0;
    }
    h2 {
      margin: 0 0 15px 0;
      color: #00d9ff;
      text-align: center;
    }
    .info {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .status {
      text-align: center;
      padding: 10px;
      background: rgba(0, 255, 136, 0.1);
      border: 2px solid #00ff88;
      border-radius: 8px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .link {
      display: block;
      text-align: center;
      color: #00d9ff;
      text-decoration: none;
      padding: 10px;
      background: rgba(0, 217, 255, 0.1);
      border-radius: 6px;
      margin-top: 10px;
      transition: all 0.3s;
    }
    .link:hover {
      background: rgba(0, 217, 255, 0.2);
    }
  </style>
</head>
<body>
  <h2>🎯 PO OTC Signal</h2>
  <div class="status">Extension Active</div>
  <div class="info">
    <strong>Strategy:</strong> RSI + Stochastic<br>
    <strong>Timeframe:</strong> 30s candles / 1m trades<br>
    <strong>Signal timing:</strong> Last 5-10 seconds
  </div>
  <div class="info">
    ✅ Go to PocketOption.com<br>
    ✅ Set chart to S30 (30 seconds)<br>
    ✅ Set expiry to M1 (1 minute)<br>
    ✅ Wait for signals to appear
  </div>
  <a href="https://github.com/Rafid31/PocketOption-OTC-Signal-Extension" target="_blank" class="link">View on GitHub</a>
</body>
</html>
